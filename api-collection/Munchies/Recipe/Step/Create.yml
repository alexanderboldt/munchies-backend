info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/recipes/:recipe_id/steps"
  headers:
    - name: X-API-VERSION
      value: "1"
  params:
    - name: recipe_id
      value: "2"
      type: path
  body:
    type: json
    data: |-
      {
        "number": 1,
        "title": "Create the dough",
        "description": "Mix flour, water and salt."
      }
  auth:
    type: bearer
    token: "{{ACCESS_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
