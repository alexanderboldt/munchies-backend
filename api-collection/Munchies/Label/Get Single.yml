info:
  name: Get Single
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/labels/:id"
  headers:
    - name: X-API-VERSION
      value: "1"
  params:
    - name: id
      value: "1"
      type: path
  auth:
    type: bearer
    token: "{{ACCESS_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
