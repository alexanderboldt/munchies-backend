info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/labels"
  headers:
    - name: X-API-VERSION
      value: "1"
  body:
    type: json
    data: |-
      {
        "name": "Vegetarian"
      }
  auth:
    type: bearer
    token: "{{ACCESS_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
